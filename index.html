<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zippity Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07); --accent: #b07fff; --accent2: #ff6ef7;
    --text: #f0f0f8; --muted: #8888a0; --green: #3dffa0;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; padding: 2rem 1rem 4rem; }
  .wrap { max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 2.5rem; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .brand-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; }
  .brand-name { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-sub { font-size: 14px; color: var(--muted); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
  .card-accent-top { border-top: 2px solid; border-image: linear-gradient(90deg, var(--accent), var(--accent2)) 1; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
  .upload-zone { border: 1px dashed rgba(176,127,255,0.3); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; position: relative; transition: all 0.2s; background: rgba(176,127,255,0.03); }
  .upload-zone:hover { border-color: var(--accent); background: rgba(176,127,255,0.07); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; display: none; margin-top: 14px; }
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  input[type=text], textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 15px; color: var(--text); font-family: inherit; outline: none; transition: border 0.2s; }
  input[type=text]:focus, textarea:focus { border-color: rgba(176,127,255,0.5); }
  textarea { height: 88px; resize: vertical; }
  .btn-generate { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; transition: opacity 0.2s, transform 0.1s; }
  .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-download { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; background: linear-gradient(135deg, #1fcc7a, #17a862); color: #fff; margin-top: 10px; transition: opacity 0.2s, transform 0.1s; }
  .btn-download:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-download:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-replay { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; background: var(--surface2); color: var(--muted); margin-top: 8px; transition: all 0.2s; }
  .btn-replay:hover { border-color: rgba(176,127,255,0.4); color: var(--text); }
  .btn-copy { float: right; font-size: 12px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; transition: all 0.15s; }
  .btn-copy:hover { color: var(--accent); border-color: rgba(176,127,255,0.4); }
  .output-section { display: none; margin-top: 1.5rem; }
  .output-section.visible { display: block; }
  .output-text { font-size: 15px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
  .reel-outer { display: flex; justify-content: center; }
  .canvas-shadow { border-radius: 20px; overflow: hidden; box-shadow: 0 0 0 1px rgba(176,127,255,0.15), 0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(176,127,255,0.12); }
  canvas { display: block; width: 270px; height: 480px; }
  .status { font-size: 13px; color: var(--muted); text-align: center; margin-top: 10px; min-height: 20px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
  .row-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; background: rgba(61,255,160,0.12); color: var(--green); border: 1px solid rgba(61,255,160,0.25); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">Z</div>
      <div class="brand-name">Zippity Studio</div>
    </div>
    <div class="header-sub">Upload your product — AI writes your content &amp; builds a promo video you can download</div>
  </div>

  <div class="card">
    <div class="card-title">Product photo</div>
    <div class="upload-zone">
      <input type="file" accept="image/*" id="fileInput"/>
      <div id="uploadHint">
        <div class="upload-icon">&#128247;</div>
        <div style="font-size:14px;color:var(--muted)">Drop your product photo here</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.2);margin-top:4px">JPG · PNG · WEBP</div>
      </div>
      <img id="preview" class="preview-img"/>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Product details</div>
    <div class="field">
      <label>Product name</label>
      <input type="text" id="productName" placeholder="e.g. Zippity Glow Serum"/>
    </div>
    <div class="field">
      <label>Description — key features, who it's for</label>
      <textarea id="productDesc" placeholder="What makes this product amazing..."></textarea>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">&#10024; Generate content + promo video</button>

  <div class="output-section" id="outputSection">
    <div class="card card-accent-top" style="margin-top:1.5rem">
      <div class="row-label">
        <div class="card-title" style="margin-bottom:0">Animated promo reel</div>
        <span class="pill">VIDEO PREVIEW</span>
      </div>
      <div class="reel-outer">
        <div class="canvas-shadow">
          <canvas id="reelCanvas" width="540" height="960"></canvas>
        </div>
      </div>
      <div class="status" id="statusMsg"></div>
      <button class="btn-replay" onclick="playReel()">&#9654; Replay animation</button>
      <button class="btn-download" id="downloadBtn" onclick="recordAndDownload()" disabled>&#11015; Record &amp; download video (.webm)</button>
    </div>

    <div class="card">
      <div style="overflow:hidden;margin-bottom:10px">
        <div class="card-title" style="float:left;margin-bottom:0">Product description</div>
        <button class="btn-copy" onclick="copyText('descOutput',this)">Copy</button>
      </div>
      <div class="output-text" id="descOutput"></div>
    </div>

    <div class="card">
      <div style="overflow:hidden;margin-bottom:10px">
        <div class="card-title" style="float:left;margin-bottom:0">Instagram caption</div>
        <button class="btn-copy" onclick="copyText('captionOutput',this)">Copy</button>
      </div>
      <div class="output-text" id="captionOutput"></div>
    </div>

    <button class="btn-generate" onclick="generate()">&#128257; Regenerate all</button>
  </div>
</div>

<script>
const W=540, H=960, DURATION=6500;
let imgDataUrl=null, base64Image=null, imgMediaType='image/jpeg';
let productImg=null, parsed={}, productName='';
let rafId=null, particles=[], recordedChunks=[];

document.getElementById('fileInput').addEventListener('change', e => {
  const file=e.target.files[0]; if(!file) return;
  imgMediaType=file.type||'image/jpeg';
  const r=new FileReader();
  r.onload=ev=>{
    imgDataUrl=ev.target.result; base64Image=imgDataUrl.split(',')[1];
    document.getElementById('preview').src=imgDataUrl;
    document.getElementById('preview').style.display='block';
    document.getElementById('uploadHint').style.display='none';
    productImg=new Image(); productImg.src=imgDataUrl;
  };
  r.readAsDataURL(file);
});

async function generate(){
  const name=document.getElementById('productName').value.trim();
  const desc=document.getElementById('productDesc').value.trim();
  if(!name&&!desc){alert('Please enter a product name or description.');return;}
  const btn=document.getElementById('generateBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Generating magic...';
  document.getElementById('outputSection').classList.remove('visible');
  const uc=[];
  if(base64Image) uc.push({type:'image',source:{type:'base64',media_type:imgMediaType,data:base64Image}});
  uc.push({type:'text',text:`You are a pro content creator for Zippity by Jerrica (22, American).
Product: ${name||'Not specified'}
Info: ${desc||'See image'}
${base64Image?'Photo included.':''}
Return ONLY JSON no markdown:
{"product_description":"2-3 punchy sentences.","instagram_caption":"Bold hook, 4 emoji bullets, CTA, hashtags on new line.","reel_tagline":"5-7 word hype line","reel_highlight":"Strongest benefit 5 words max","reel_cta":"2-3 word CTA"}`});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:uc}]})});
    const data=await res.json();
    const raw=data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    parsed=JSON.parse(raw); productName=name;
    document.getElementById('descOutput').textContent=parsed.product_description;
    document.getElementById('captionOutput').textContent=parsed.instagram_caption;
    document.getElementById('outputSection').classList.add('visible');
    document.getElementById('downloadBtn').disabled=false;
    initParticles(); playReel();
  }catch(err){alert('Something went wrong. Try again.');}
  btn.disabled=false; btn.innerHTML='&#10024; Generate content + promo video';
}

function initParticles(){
  particles=Array.from({length:45},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:0.8+Math.random()*2.5,
    vx:(Math.random()-0.5)*0.45,vy:-0.25-Math.random()*0.55,
    alpha:0.15+Math.random()*0.55,
    color:Math.random()>0.5?'#b07fff':'#ff6ef7'
  }));
}

function easeOut(t){return 1-Math.pow(1-t,3);}
function clamp01(t){return Math.max(0,Math.min(1,t));}
function fade(el,s,d){return easeOut(clamp01((el-s)/d));}

function drawFrame(elapsed){
  const canvas=document.getElementById('reelCanvas');
  const ctx=canvas.getContext('2d');
  const t=Math.min(elapsed/DURATION,1);
  ctx.clearRect(0,0,W,H);

  // Ken Burns background
  const sc=1+t*0.07;
  const ox=(W-W*sc)/2, oy=(H-H*sc)/2;
  ctx.save(); ctx.translate(ox,oy); ctx.scale(sc,sc);
  if(productImg&&productImg.complete&&productImg.naturalWidth>0){
    const ir=productImg.naturalWidth/productImg.naturalHeight, cr=W/H;
    let dW,dH,dX,dY;
    if(ir>cr){dH=H;dW=H*ir;dX=(W-dW)/2;dY=0;}
    else{dW=W;dH=W/ir;dX=0;dY=(H-dH)/2;}
    ctx.drawImage(productImg,dX,dY,dW,dH);
  } else {
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#1a0533');g.addColorStop(0.5,'#0d0025');g.addColorStop(1,'#001133');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }
  ctx.restore();

  // Overlays
  const ov1=ctx.createLinearGradient(0,H*0.28,0,H);
  ov1.addColorStop(0,'rgba(0,0,0,0)');ov1.addColorStop(1,'rgba(0,0,0,0.94)');
  ctx.fillStyle=ov1;ctx.fillRect(0,0,W,H);
  const ov2=ctx.createLinearGradient(0,0,0,H*0.38);
  ov2.addColorStop(0,'rgba(0,0,0,0.68)');ov2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ov2;ctx.fillRect(0,0,W,H);

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    ctx.save();ctx.globalAlpha=p.alpha*Math.min(1,elapsed/900);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();ctx.restore();
  });

  // Progress bar
  ctx.save();ctx.globalAlpha=0.28;ctx.fillStyle='#fff';
  roundRect(ctx,36,30,W-72,3,2);ctx.fill();
  ctx.globalAlpha=1;
  const pg=ctx.createLinearGradient(36,0,W-72,0);
  pg.addColorStop(0,'#b07fff');pg.addColorStop(1,'#ff6ef7');
  ctx.fillStyle=pg;roundRect(ctx,36,30,Math.max(0,(W-72)*t),3,2);ctx.fill();
  ctx.restore();

  // Header
  const hA=fade(elapsed,0,550);
  ctx.save();ctx.globalAlpha=hA;
  ctx.beginPath();ctx.arc(60,78,26,0,Math.PI*2);
  const ag=ctx.createLinearGradient(34,52,86,104);
  ag.addColorStop(0,'#b07fff');ag.addColorStop(1,'#ff6ef7');
  ctx.fillStyle=ag;ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 20px system-ui';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Z',60,78);
  ctx.textAlign='left';ctx.font='600 24px system-ui';ctx.fillStyle='#fff';ctx.fillText('@zippity',98,72);
  ctx.font='18px system-ui';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('Content Creator',98,96);
  ctx.strokeStyle='rgba(255,255,255,0.65)';ctx.lineWidth=1.5;
  roundRect(ctx,W-128,58,96,38,8);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='600 18px system-ui';ctx.textAlign='center';ctx.fillText('Follow',W-80,78);
  ctx.restore();

  // Glow accent line
  const laA=fade(elapsed,400,400);
  ctx.save();ctx.globalAlpha=laA*0.8;
  const lg=ctx.createLinearGradient(44,0,W-44,0);
  lg.addColorStop(0,'transparent');lg.addColorStop(0.25,'#b07fff');
  lg.addColorStop(0.75,'#ff6ef7');lg.addColorStop(1,'transparent');
  ctx.strokeStyle=lg;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(44,H-390);ctx.lineTo(W-44,H-390);ctx.stroke();
  ctx.restore();

  // Highlight badge
  const hlA=fade(elapsed,600,500);
  const hlY=H-360+(1-easeOut(clamp01((elapsed-600)/500)))*28;
  ctx.save();ctx.globalAlpha=hlA;
  ctx.font='500 26px system-ui';
  const hlText=(parsed.reel_highlight||'').toUpperCase();
  const hlW=ctx.measureText(hlText).width+40;
  const hlX=W/2-hlW/2;
  ctx.fillStyle='rgba(176,127,255,0.18)';
  roundRect(ctx,hlX,hlY-26,hlW,36,18);ctx.fill();
  ctx.strokeStyle='rgba(176,127,255,0.4)';ctx.lineWidth=1;
  roundRect(ctx,hlX,hlY-26,hlW,36,18);ctx.stroke();
  ctx.fillStyle='#c89fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(hlText,W/2,hlY-8);
  ctx.restore();

  // Product name
  const pnA=fade(elapsed,1000,550);
  const pnY=H-290+(1-easeOut(clamp01((elapsed-1000)/550)))*32;
  ctx.save();ctx.globalAlpha=pnA;
  ctx.font='bold 64px system-ui';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(176,127,255,0.45)';ctx.shadowBlur=35;
  wrapText(ctx,productName||'New Drop',W/2,pnY,W-80,72);
  ctx.restore();

  // Tagline
  const tlA=fade(elapsed,1600,500);
  const tlY=H-195+(1-easeOut(clamp01((elapsed-1600)/500)))*22;
  ctx.save();ctx.globalAlpha=tlA;
  ctx.font='400 30px system-ui';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='rgba(255,255,255,0.72)';ctx.shadowColor='transparent';
  wrapText(ctx,parsed.reel_tagline||'',W/2,tlY,W-100,40);
  ctx.restore();

  // CTA button
  const ctaA=fade(elapsed,2200,600);
  const ctaSlide=(1-easeOut(clamp01((elapsed-2200)/600)))*22;
  ctx.save();ctx.globalAlpha=ctaA;
  const ctaText=(parsed.reel_cta||'Shop Now').toUpperCase();
  ctx.font='bold 24px system-ui';
  const tw=ctx.measureText(ctaText).width;
  const px=W/2-tw/2-32,py=H-122+ctaSlide,pw=tw+64,ph=56;
  const cg=ctx.createLinearGradient(px,py,px+pw,py);
  cg.addColorStop(0,'#b07fff');cg.addColorStop(1,'#ff6ef7');
  ctx.fillStyle=cg;roundRect(ctx,px,py,pw,ph,28);ctx.fill();
  // glow
  ctx.shadowColor='rgba(176,127,255,0.5)';ctx.shadowBlur=24;
  roundRect(ctx,px,py,pw,ph,28);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ctaText,W/2,py+ph/2);
  ctx.restore();

  // Watermark
  const wmA=fade(elapsed,2800,500);
  ctx.save();ctx.globalAlpha=wmA*0.4;
  ctx.font='500 18px system-ui';ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.fillText('zippity.co',W/2,H-44);
  ctx.restore();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='';
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&i>0){ctx.fillText(line.trim(),x,y);line=words[i]+' ';y+=lineH;}
    else{line=test;}
  }
  ctx.fillText(line.trim(),x,y);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function playReel(){
  if(rafId)cancelAnimationFrame(rafId);
  document.getElementById('statusMsg').textContent='';
  let st=null;
  function loop(ts){
    if(!st)st=ts;
    const el=ts-st;
    drawFrame(el);
    if(el<DURATION)rafId=requestAnimationFrame(loop);
    else drawFrame(DURATION);
  }
  rafId=requestAnimationFrame(loop);
}

async function recordAndDownload(){
  const btn=document.getElementById('downloadBtn');
  const statusEl=document.getElementById('statusMsg');
  btn.disabled=true;
  btn.textContent='Starting recorder...';
  const canvas=document.getElementById('reelCanvas');
  const stream=canvas.captureStream(30);
  recordedChunks=[];
  const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const recorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:5000000});
  recorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
  recorder.onstop=()=>{
    const blob=new Blob(recordedChunks,{type:'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=(productName||'zippity_promo')+'_reel.webm';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.disabled=false;btn.innerHTML='&#11015; Record &amp; download video (.webm)';
    statusEl.textContent='Video downloaded successfully!';
    setTimeout(()=>statusEl.textContent='',3000);
  };
  recorder.start(100);
  initParticles();
  if(rafId)cancelAnimationFrame(rafId);
  let elapsed=0,lastT=performance.now();
  btn.innerHTML='<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;background:#ff4444;border-radius:50%;display:inline-block;animation:blink 1s infinite"></span> Recording video...</span>';
  function recLoop(ts){
    const delta=ts-lastT;lastT=ts;elapsed+=delta;
    drawFrame(elapsed);
    if(elapsed<DURATION+300){rafId=requestAnimationFrame(recLoop);}
    else{recorder.stop();}
  }
  rafId=requestAnimationFrame(recLoop);
}

function copyText(id,btn){
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(()=>{
    btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);
  });
}
</script>
</body>
</html>
